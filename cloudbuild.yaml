# Cloud Build configuration for RecyGlo Clone
# This file automates the build and deployment process to Google Cloud Run

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recyglo-clone:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/recyglo-clone:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    waitFor: ['-']

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/recyglo-clone:$SHORT_SHA'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-cloud-run'
    args:
      - 'deploy'
      - 'recyglo-clone'
      - '--image'
      - 'gcr.io/$PROJECT_ID/recyglo-clone:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '100'
      - '--min-instances'
      - '1'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=us-central1'
    waitFor: ['push-image']

# Images to be pushed to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/recyglo-clone:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/recyglo-clone:latest'

# Build timeout (30 minutes)
timeout: '1800s'

# Substitutions
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'recyglo-clone'

# Options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitution_option: 'ALLOW_LOOSE'
